[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
# Start conservative: basic errors + imports
select = ["E", "F", "W", "I"]
# Ignore rules that conflict with current code style
ignore = [
    "E501",   # line too long (handled by line-length setting loosely)
    "E741",   # ambiguous variable name
    "F841",   # local variable assigned but never used (will clean later)
    "E731",   # lambda assignment (used in a few places)
]

[tool.ruff.lint.per-file-ignores]
"backend/tests/*.py" = ["E402"]
"backend/main.py" = ["E402"]
"backend/game/*.py" = ["E402"]   # __future__ annotations triggers false E402

[tool.ruff.lint.isort]
known-first-party = ["game"]

[tool.ruff.format]
quote-style = "double"
